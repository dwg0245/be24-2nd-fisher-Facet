version: '3.8'

services:
  frontend:
    # dockerfileлЎң мқҙлҜём§Җ мғқм„ұн•ҳкё°
    build:
      context: ../vue
      dockerfile: ../vue/Dockerfile
      # dockerfileм—җкІҢ нҷҳкІҪліҖмҲҳлҘј л„ҳкІЁмӨҖлӢӨ.
      args:
        - VITE_PAYMENT_STOREID=${VITE_PAYMENT_STOREID}
        - VITE_PAYMENT_CHANNELKEY=${VITE_PATMENT_CHANNELKEY}
              #   - VITE_BACKEND_URL=https://www.facet7.kro.kr/api
        
    ports:
      - "80:80"  # лӮҳмӨ‘м—җ мқёмҰқ  м„ң н•ҳл©ҙ 443лІҲмңјлЎң н•ҳкё°
      - "443:443"
    depends_on:
      - backend
